name: lahtha-click-web CI

on:
  push:
    branches: [main]
    paths:
      - 'lahtha-click-web/**'
      - '.github/workflows/lahtha-click-web-ci.yml'
  pull_request:
    paths:
      - 'lahtha-click-web/**'
      - '.github/workflows/lahtha-click-web-ci.yml'

defaults:
  run:
    working-directory: lahtha-click-web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

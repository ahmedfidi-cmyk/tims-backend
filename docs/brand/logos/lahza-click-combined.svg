<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200" role="img" aria-label="LAHZA and CLICK combined">
  <title>LAHZA × CLICK</title>
  <desc>Combined ecosystem wordmark. Two wordmarks side by side, separated by a hairline divider.</desc>

  <!-- LAHZA -->
  <text x="40" y="130"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="100"
        font-weight="900"
        fill="#0A0A0A"
        letter-spacing="-3">LAHZA</text>
  <rect x="40" y="146" width="48" height="8" fill="#FF4D00"/>

  <!-- Divider -->
  <line x1="480" y1="40" x2="480" y2="160" stroke="#E5E5E5" stroke-width="1"/>

  <!-- CLICK -->
  <text x="520" y="130"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="100"
        font-weight="900"
        fill="#0A0A0A"
        letter-spacing="-3">CLICK</text>
  <rect x="520" y="146" width="240" height="8" fill="#FF4D00"/>
</svg>
